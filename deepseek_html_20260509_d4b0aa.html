<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中医体质分类与判定自测表</title>
    <style>
        :root {
            --bg: #fdf8f3;
            --card-bg: #ffffff;
            --primary: #8b5e3c;
            --primary-light: #c4956a;
            --accent: #d4a574;
            --accent-light: #f5efe6;
            --text: #3d2b1f;
            --text-light: #6b5d4f;
            --border: #e0d3c5;
            --danger: #b8453a;
            --success: #5a7d5a;
            --warning: #c4943a;
            --shadow: 0 2px 16px rgba(139, 94, 60, 0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(212, 165, 116, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(139, 94, 60, 0.06) 0%, transparent 60%);
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        .header {
            text-align: center;
            padding: 36px 20px 24px;
        }
        .header .icon {
            font-size: 48px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.04em;
        }
        .header .subtitle {
            font-size: 0.92rem;
            color: var(--text-light);
        }
        .header .badge {
            display: inline-block;
            background: var(--accent-light);
            color: var(--primary);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            margin-top: 8px;
            border: 1px solid var(--border);
        }

        .main-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .tab-nav-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
        }
        .tab-nav {
            display: flex;
            overflow-x: auto;
            scrollbar-width: thin;
            gap: 0;
            padding: 4px 8px;
        }
        .tab-btn {
            flex-shrink: 0;
            padding: 10px 14px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-light);
            border-bottom: 3px solid transparent;
            transition: var(--transition);
            white-space: nowrap;
            font-family: inherit;
        }
        .tab-btn:hover {
            color: var(--primary);
            background: rgba(139, 94, 60, 0.03);
        }
        .tab-btn.active {
            color: var(--primary);
            font-weight: 700;
            border-bottom-color: var(--primary);
        }
        .tab-btn .tab-letter {
            display: inline-block;
            width: 20px;
            height: 20px;
            line-height: 20px;
            border-radius: 50%;
            background: var(--accent-light);
            color: var(--primary);
            font-size: 0.7rem;
            font-weight: 700;
            margin-right: 4px;
            text-align: center;
            transition: var(--transition);
        }
        .tab-btn.active .tab-letter {
            background: var(--primary);
            color: #fff;
        }
        .tab-btn.completed .tab-letter {
            background: var(--success);
            color: #fff;
        }
        .tab-btn.completed::after {
            content: '✓';
            font-size: 0.65rem;
            color: var(--success);
            margin-left: 2px;
            font-weight: 700;
        }

        .tab-content-wrapper {
            padding: 20px 20px 12px;
            min-height: 300px;
        }
        .tab-panel {
            display: none;
            animation: fadeSlideIn 0.35s ease;
        }
        .tab-panel.active {
            display: block;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tab-panel-header {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px dashed var(--border);
        }
        .tab-panel-header h3 {
            font-size: 1.15rem;
            color: var(--primary);
            font-weight: 700;
        }
        .type-tag {
            display: inline-block;
            background: var(--accent-light);
            color: var(--primary);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-left: 6px;
        }
        .question-count {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        .question-item {
            margin-bottom: 14px;
            padding: 14px 16px;
            background: #fefcf9;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            transition: var(--transition);
        }
        .question-item:hover {
            border-color: var(--border);
        }
        .question-item.answered {
            border-color: #d4c8b8;
            background: #fdfaf5;
        }
        .q-number {
            display: inline-block;
            width: 22px;
            height: 22px;
            line-height: 22px;
            border-radius: 50%;
            background: var(--accent-light);
            color: var(--primary);
            font-size: 0.7rem;
            font-weight: 700;
            text-align: center;
            margin-right: 6px;
        }
        .q-text {
            font-size: 0.93rem;
            color: var(--text);
            margin-bottom: 8px;
            display: inline;
        }
        .q-reverse {
            display: inline-block;
            font-size: 0.7rem;
            color: #c0392b;
            background: #fef5f5;
            padding: 1px 8px;
            border-radius: 10px;
            margin-left: 4px;
            vertical-align: middle;
        }
        .q-gender {
            display: inline-block;
            font-size: 0.7rem;
            color: #8b5e3c;
            background: #fdf5eb;
            padding: 1px 8px;
            border-radius: 10px;
            margin-left: 4px;
            vertical-align: middle;
        }
        .radio-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .radio-option {
            flex: 1;
            min-width: 52px;
            text-align: center;
        }
        .radio-option input {
            display: none;
        }
        .radio-option label {
            display: block;
            padding: 8px 4px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.78rem;
            color: var(--text-light);
            background: #faf7f3;
            border: 1.5px solid #e8ddd0;
            transition: var(--transition);
            text-align: center;
            white-space: nowrap;
        }
        .radio-option label:hover {
            background: #f5ede2;
            border-color: var(--accent);
            color: var(--text);
        }
        .radio-option input:checked+label {
            background: #f0e6d8;
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 700;
            box-shadow: 0 1px 4px rgba(139, 94, 60, 0.15);
        }
        .score-num {
            display: block;
            font-size: 0.68rem;
            color: #aaa;
            margin-top: 1px;
        }
        .radio-option input:checked+label .score-num {
            color: var(--primary);
        }

        .action-bar {
            display: flex;
            gap: 12px;
            padding: 16px 20px 20px;
            flex-wrap: wrap;
            border-top: 1px solid var(--border);
            background: #fefcf9;
            position: sticky;
            bottom: 0;
        }
        .btn {
            padding: 11px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: var(--transition);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 3px 12px rgba(139, 94, 60, 0.25);
        }
        .btn-primary:hover {
            background: #6b4530;
        }
        .btn-outline {
            background: #fff;
            color: var(--primary);
            border: 1.5px solid var(--primary);
        }
        .btn-outline:hover {
            background: var(--accent-light);
        }
        .btn-sm {
            padding: 7px 16px;
            font-size: 0.8rem;
            border-radius: 20px;
        }

        .progress-bar-wrap {
            background: #f0e8da;
            border-radius: 10px;
            height: 6px;
            margin: 0 20px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--primary));
            border-radius: 10px;
            transition: width 0.4s ease;
        }
        .progress-text {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 4px;
            margin-bottom: 8px;
        }

        .result-section {
            display: none;
            margin-top: 20px;
            animation: fadeSlideIn 0.5s ease;
        }
        .result-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px 20px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .result-card.primary-result {
            border-left: 5px solid var(--primary);
            background: linear-gradient(135deg, #fffdf9 0%, #fefaf4 100%);
        }
        .result-card.tendency-result {
            border-left: 5px solid var(--warning);
            background: #fffef9;
        }
        .result-badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        .badge-yes {
            background: #fdf0e6;
            color: #8b3a1a;
            border: 1px solid #e8b896;
        }
        .badge-tendency {
            background: #fef9ee;
            color: #8b6d2a;
            border: 1px solid #e8d896;
        }
        .badge-pinghe {
            background: #edf7ed;
            color: #3a6b3a;
            border: 1px solid #a8d4a8;
        }
        .feature-block {
            margin-top: 10px;
            padding: 12px 14px;
            background: #fefcf9;
            border-radius: var(--radius-sm);
            border: 1px solid #f0e8da;
            font-size: 0.88rem;
        }
        .feature-block strong {
            color: var(--primary);
            display: block;
            margin-bottom: 4px;
        }
        .feature-block ul {
            margin: 4px 0 0 16px;
        }
        .feature-block li {
            margin-bottom: 3px;
        }

        .score-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        .score-table th,
        .score-table td {
            padding: 8px 10px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .score-table th {
            background: #fdf8f3;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.78rem;
        }
        .highlight-row {
            background: #fef9f2;
            font-weight: 600;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #3d2b1f;
            color: #fff;
            padding: 10px 22px;
            border-radius: 24px;
            font-size: 0.85rem;
            z-index: 999;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
            pointer-events: none;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
        }

        @media (max-width: 640px) {
            .header h1 {
                font-size: 1.35rem;
            }
            .tab-btn {
                padding: 10px 10px;
                font-size: 0.75rem;
            }
            .tab-content-wrapper {
                padding: 14px 10px 8px;
            }
            .question-item {
                padding: 10px 10px;
                margin-bottom: 8px;
            }
            .radio-option label {
                font-size: 0.7rem;
                padding: 6px 2px;
            }
            .btn {
                padding: 9px 16px;
                font-size: 0.8rem;
            }
            .score-table {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="icon">🌿</span>
            <h1>中医体质分类与判定自测表</h1>
            <p class="subtitle">中华中医药学会标准 · 9类体质综合评估</p>
            <span class="badge">依据《中医体质分类判定标准》</span>
        </div>

        <div class="main-card" id="mainCard">
            <div class="tab-nav-wrapper">
                <div class="tab-nav" id="tabNav">
                    <button class="tab-btn active" data-tab="tab-pinghe" data-index="0"><span class="tab-letter">A</span>平和质</button>
                    <button class="tab-btn" data-tab="tab-qixu" data-index="1"><span class="tab-letter">B</span>气虚质</button>
                    <button class="tab-btn" data-tab="tab-yangxu" data-index="2"><span class="tab-letter">C</span>阳虚质</button>
                    <button class="tab-btn" data-tab="tab-yinxu" data-index="3"><span class="tab-letter">D</span>阴虚质</button>
                    <button class="tab-btn" data-tab="tab-tanshi" data-index="4"><span class="tab-letter">E</span>痰湿质</button>
                    <button class="tab-btn" data-tab="tab-shire" data-index="5"><span class="tab-letter">F</span>湿热质</button>
                    <button class="tab-btn" data-tab="tab-xueyu" data-index="6"><span class="tab-letter">G</span>血瘀质</button>
                    <button class="tab-btn" data-tab="tab-qiyu" data-index="7"><span class="tab-letter">H</span>气郁质</button>
                    <button class="tab-btn" data-tab="tab-tebing" data-index="8"><span class="tab-letter">I</span>特禀质</button>
                </div>
            </div>

            <div class="progress-bar-wrap" style="margin-top:10px;">
                <div class="progress-bar-fill" id="progressBar" style="width:0%;"></div>
            </div>
            <p class="progress-text" id="progressText">已作答：0 / 67 题</p>

            <div class="tab-content-wrapper" id="tabContentWrapper">
                <!-- 9个tab-panel由JavaScript动态生成题目，此处保留空容器 -->
                <div class="tab-panel active" id="tab-pinghe"><div id="questions-pinghe"></div></div>
                <div class="tab-panel" id="tab-qixu"><div id="questions-qixu"></div></div>
                <div class="tab-panel" id="tab-yangxu"><div id="questions-yangxu"></div></div>
                <div class="tab-panel" id="tab-yinxu"><div id="questions-yinxu"></div></div>
                <div class="tab-panel" id="tab-tanshi"><div id="questions-tanshi"></div></div>
                <div class="tab-panel" id="tab-shire"><div id="questions-shire"></div></div>
                <div class="tab-panel" id="tab-xueyu"><div id="questions-xueyu"></div></div>
                <div class="tab-panel" id="tab-qiyu"><div id="questions-qiyu"></div></div>
                <div class="tab-panel" id="tab-tebing"><div id="questions-tebing"></div></div>
            </div>

            <div class="action-bar" id="actionBar">
                <button class="btn btn-outline btn-sm" id="btnPrev" disabled>◀ 上一项</button>
                <button class="btn btn-outline btn-sm" id="btnNext">下一项 ▶</button>
                <span style="flex:1;"></span>
                <button class="btn btn-outline btn-sm" id="btnReset">🔄 重置全部</button>
                <button class="btn btn-primary" id="btnSubmit">📊 提交问卷，查看结果</button>
            </div>
        </div>

        <div class="result-section" id="resultSection"></div>
    </div>
    <div id="toastContainer"></div>

    <script>
        (function() {
            // ---------- 体质数据定义（全部使用英文变量名） ----------
            const constitutionData = {

                    id: 'pinghe',

                qixu: {

                yangxu: {

                    ],
                    features: {

                        心理特征: '性格多沉静、内向。',
                        发病倾向: '易患痰饮、肿胀、泄泻等病；感邪易从寒化。',

                    advice: '平时可多食牛肉、羊肉、韭菜、生姜等温阳之品，少食梨、西瓜、荸荠等生冷寒凉食物，少饮绿茶。注意保暖，尤其腰腹部和足部。适合艾灸、温灸等温热调理。',
                },
                yinxu: {
                    id: 'yinxu',

                    const tabBtn = document.querySelector(`.tab-btn[data-tab="tab-${typeId}"]`);

                        if (answers[typeId + '_q' + i]) answeredCount++;

                const pct = totalQuestions > 0 ? Math.round((answeredCount / totalQuestions) * 100) : 0;

                if (index < 0 || index >= totalTabs) return;

                document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                    btn.classList.toggle('active', i === index);

                document.querySelectorAll('.tab-panel').forEach(panel => {
                    panel.classList.toggle('active', panel.id === tabId);

                btnPrev.disabled = (index === 0);
                btnNext.textContent = (index === totalTabs - 1) ? '完成 ▶' : '下一项 ▶';

                if (currentTabIndex > 0) switchTab(currentTabIndex - 1);

            // 计算转化分
            function calculateTransformScore(typeId) {
                const config = constitutionData[typeId];
                let rawScore = 0;
                for (let i = 0; i < config.questionCount; i++) {
                    const key = typeId + '_q' + i;
                    let score = answers[key] || 1;
                    score = parseInt(score);
                    if (config.reverseIndices.includes(i)) {
                        score = 6 - score;
                    }
                    rawScore += score;
                }
                const n = config.questionCount;
                const transformScore = Math.round(((rawScore - n) / (n * 4)) * 100);
                return { rawScore, transformScore, questionCount: n };
            }

                        partialScores[typeId] = scores[typeId].transformScore;
                    }
                });

                const yesTypes = [];
                const tendencyTypes = [];
                Object.entries(partialScores).forEach(([typeId, score]) => {
                    if (score >= 40) yesTypes.push(typeId);
                    else if (score >= 30) tendencyTypes.push(typeId);
                });

                let pingheResult = '否';
                if (pingheScore >= 60) {
                    const allBelow30 = Object.values(partialScores).every(s => s < 30);
                    const allBelow40 = Object.values(partialScores).every(s => s < 40);
                    if (allBelow30) pingheResult = '是';
                    else if (allBelow40) pingheResult = '基本是';
                }

                return { scores, pingheResult, pingheScore, yesTypes, tendencyTypes, partialScores };
            }

                        </tr>`;
                });
                html += `
                        </tbody>
                    </table>
                    </div>
                    <p style="font-size:0.75rem;color:#999;margin-top:8px;">
                        *平和质判定：转化分≥60且其他8种体质转化分均＜30为“是”；转化分≥60且其他8种均＜40为“基本是”。<br>
                        *偏颇体质判定：转化分≥40为“是”；30~39为“倾向是”；＜30为“否”。
                    </p>
                </div>`;

                const detailTypes = [...yesTypes];
                if (yesTypes.length === 0 && pingheResult === '是') detailTypes.push('pinghe');
                if (yesTypes.length === 0 && pingheResult === '基本是') {
                    detailTypes.push('pinghe');
                    tendencyTypes.forEach(t => { if (!detailTypes.includes(t)) detailTypes.push(t); });
                }
                if (yesTypes.length === 0 && pingheResult === '否' && tendencyTypes.length > 0) {
                    tendencyTypes.forEach(t => { if (!detailTypes.includes(t)) detailTypes.push(t); });
                }

                detailTypes.forEach(typeId => {
                    const config = constitutionData[typeId];
                    const isPrimary = yesTypes.includes(typeId) || (typeId === 'pinghe' && pingheResult === '是');
                    const cardClass = isPrimary ? 'primary-result' : 'tendency-result';
                    const badgeLabel = isPrimary ? '主要体质' : '倾向体质';
                    const badgeCls = isPrimary ? 'badge-yes' : 'badge-tendency';
                    html += `
                    <div class="result-card ${cardClass}">
                        <h3>${config.name}（${config.letter}型）</h3>
                        <span class="result-badge ${badgeCls}">${badgeLabel}</span>
                        <div class="feature-block">
                            <strong>🏷️ 体质特征</strong>
                            <ul>${Object.entries(config.features).map(([k,v]) => `<li><em>${k}：</em>${v}</li>`).join('')}</ul>
                        </div>
                        <div class="feature-block" style="margin-top:8px;">
                            <strong>💡 日常调节建议</strong>
                            <p style="margin-top:4px;">${config.advice}</p>
                        </div>
                    </div>`;
                });

                resultSection.innerHTML = html;
                resultSection.style.display = 'block';
            }

            btnSubmit.addEventListener('click', handleSubmit);

            btnReset.addEventListener('click', () => {
                if (confirm('确定要重置全部问卷答案吗？此操作不可恢复。')) {
                    answers = {};
                    resultSection.style.display = 'none';
                    resultSection.innerHTML = '';
                    renderAllQuestions();
                    updateProgress();
                    updateTabCompletionStatus();
                    switchTab(0);
                    showToast('✅ 已重置全部答案');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            function showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                toastContainer.appendChild(toast);
                setTimeout(() => toast.remove(), 2600);
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && e.ctrlKey) {
                    e.preventDefault();
                    if (currentTabIndex > 0) switchTab(currentTabIndex - 1);
                } else if (e.key === 'ArrowRight' && e.ctrlKey) {
                    e.preventDefault();
                    if (currentTabIndex < totalTabs - 1) switchTab(currentTabIndex + 1);
                }
            });

            // 初始化
            renderAllQuestions();
            updateProgress();
            switchTab(0);
            resultSection.style.display = 'none';
        })();
    </script>
</body>
</html>
